name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86-64
          - os: macos-latest
            platform: darwin-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install make gcc

      - name: Build native library
        run: bash native/build.sh

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native/lib/

  build-test:
    needs: build-native
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86-64
            lib-name: libagc.so
          - os: macos-latest
            platform: darwin-aarch64
            lib-name: libagc.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download native library
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: native/lib/

      - name: Copy native lib to resources
        run: |
          mkdir -p src/main/resources/native/${{ matrix.platform }}
          cp native/lib/${{ matrix.lib-name }} src/main/resources/native/${{ matrix.platform }}/

      - name: Build and test
        run: ./gradlew build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.platform }}
          path: build/reports/tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run ktlint and detekt
        run: ./gradlew ktlintCheck detekt
