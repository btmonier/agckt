[workspace]
name        = "agckt"
version     = "0.1.0"
description = "Kotlin/JVM bindings and utilities for working with AGC (Assembled Genomes Compressor) archives."
channels    = ["conda-forge", "https://conda.anaconda.org/bioconda"]
platforms   = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

[dependencies]
cmake = ">=3.20"
make  = ">=4"
git   = "*"
gcc   = ">=11"
gxx   = ">=11"
agc = { version = ">=3.2", channel = "bioconda" }
r-base = ">=4.3"
r-ggplot2 = ">=3.4"

[tasks]
build-native = { cmd = "bash native/build.sh", description = "Build AGC shared library from source" }
clean-native = { cmd = "rm -rf native/agc-src native/lib", description = "Remove native build artifacts" }
benchmark = { cmd = "./gradlew benchmark && Rscript scripts/plot_benchmark.R build/reports/benchmark-data/toy_benchmark.csv build/reports/benchmark-data/toy_benchmark.png", description = "Toy AGC benchmark: CSV + ggplot2 boxplot under build/reports/benchmark-data/" }
benchmark-real = { cmd = "./gradlew benchmarkReal && Rscript scripts/plot_benchmark.R build/reports/benchmark-data/realworld_benchmark.csv build/reports/benchmark-data/realworld_benchmark.png", description = "Real archive benchmark: CSV + boxplot (needs .env / AGC_ARCHIVE_PATH)" }
benchmark-full-chr-regions = { cmd = "./gradlew benchmarkFullChrRegions && Rscript scripts/plot_benchmark.R build/reports/benchmark-data/full_chr_regions_benchmark.csv build/reports/benchmark-data/full_chr_regions_benchmark.png", description = "Chr1 5–10 kbp tiling vs chunked CLI (needs .env / AGC_ARCHIVE_PATH)" }
plot-benchmark-toy = { cmd = "Rscript scripts/plot_benchmark.R build/reports/benchmark-data/toy_benchmark.csv build/reports/benchmark-data/toy_benchmark.png", description = "Regenerate toy boxplot from existing CSV" }
plot-benchmark-real = { cmd = "Rscript scripts/plot_benchmark.R build/reports/benchmark-data/realworld_benchmark.csv build/reports/benchmark-data/realworld_benchmark.png", description = "Regenerate realworld boxplot from existing CSV" }
plot-benchmark-full-chr-regions = { cmd = "Rscript scripts/plot_benchmark.R build/reports/benchmark-data/full_chr_regions_benchmark.csv build/reports/benchmark-data/full_chr_regions_benchmark.png", description = "Regenerate full-chr regions boxplot from existing CSV" }
demo = { cmd = "./gradlew demo", description = "Run Demo.kt (AGC_ARCHIVE_PATH in .env; needs native/lib)" }
