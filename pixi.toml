[workspace]
name        = "agckt"
version     = "0.1.0"
description = "Kotlin/JVM bindings and utilities for working with AGC (Assembled Genomes Compressor) archives."
channels    = ["conda-forge", "https://conda.anaconda.org/bioconda"]
platforms   = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

[dependencies]
cmake = ">=3.20"
make  = ">=4"
git   = "*"
gcc   = ">=11"
gxx   = ">=11"
agc = { version = ">=3.2", channel = "bioconda" }

[tasks]
build-native = { cmd = "bash native/build.sh", description = "Build AGC shared library from source" }
clean-native = { cmd = "rm -rf native/agc-src native/lib", description = "Remove native build artifacts" }
benchmark      = { cmd = "./gradlew benchmark", description = "JNA vs Bioconda agc CLI (PATH includes agc; needs native/lib)" }
benchmark-real = { cmd = "./gradlew benchmarkReal", description = "JNA vs agc on AGC_ARCHIVE_PATH (.env), chr1–chr10" }
demo           = { cmd = "./gradlew demo", description = "Run Demo.kt (AGC_ARCHIVE_PATH in .env; needs native/lib)" }
